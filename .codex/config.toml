approval_policy = "on-request"
project_doc_max_bytes = 32768
sandbox_mode = "workspace-write"

[features]
child_agents_md = true

[mcp_servers.dart]
args = [
    "mcp-server",
    "--force-roots-fallback",
]
command = 'C:\Users\xursc\projects\calorix\.fvm\versions\3.41.9\bin\cache\dart-sdk\bin\dart.exe'
cwd = 'C:\Users\xursc\projects\calorix'
enabled = true
required = false
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.firebase]
args = [
    "-y",
    "firebase-tools@latest",
    "mcp",
]
command = "npx"

[mcp_servers.gcloud]
args = [
    "-y",
    "@google-cloud/gcloud-mcp",
]
command = "npx"

[mcp_servers.mobile-ui-diff]
command = "node"
args = [
    'C:\Users\xursc\projects\mobile-ui-diff-mcp\dist\index.js'
]
enabled = true

[projects.'C:\Users\xursc\projects\calorix']
trust_level = "trusted"
